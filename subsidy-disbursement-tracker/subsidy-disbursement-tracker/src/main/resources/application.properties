# Application properties for the Subsidy Disbursement Tracker

# Server configuration
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/subsidy_db
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.rimjhim.subsidytracker=DEBUG

# Other application-specific properties
app.name=Subsidy Disbursement Tracker
app.version=1.0.0